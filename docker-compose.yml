services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: flower_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "2DS9WDJRYv4pK2WUXu6"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  init-db:
    build: ./database
    container_name: flower_init_db
    user: root
    depends_on:
      - sqlserver
    command: >
      /bin/bash -c "
        echo 'Waiting for SQL Server to be ready...';
        until /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P '2DS9WDJRYv4pK2WUXu6' -Q 'SELECT 1' -C > /dev/null 2>&1; do
          echo 'SQL Server is starting up... waiting 3 seconds';
          sleep 3;
        done;
        echo 'SQL Server is ready! Running database initialization script...';
        /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P '2DS9WDJRYv4pK2WUXu6' -i /FlowerShopDB.sql -C && \
        echo 'Database FLOWER_SHOP initialized successfully!';
      "

  webapp:
    build: .
    container_name: flower_webapp
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_started
      init-db:
        condition: service_completed_successfully
    environment:
      - DB_URL=jdbc:sqlserver://sqlserver:1433;databaseName=FLOWER_SHOP;encrypt=true;trustServerCertificate=true
      - DB_USER=sa
      - DB_PASSWORD=2DS9WDJRYv4pK2WUXu6
    restart: unless-stopped

volumes:
  sqlserver_data:
