services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: flower_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "2DS9WDJRYv4pK2WUXu6"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  init-db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: flower_init_db
    user: root
    volumes:
      - ./database/FlowerShopDB.sql:/FlowerShopDB.sql:ro
    depends_on:
      - sqlserver
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
        set -e;
        until /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P '2DS9WDJRYv4pK2WUXu6' -No -Q 'SELECT 1' > /dev/null 2>&1; do
          echo 'SQL Server is starting up... waiting 3 seconds';
          sleep 3;
        done;
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P '2DS9WDJRYv4pK2WUXu6' -No -i /FlowerShopDB.sql;
        echo 'Database FLOWER_SHOP initialized successfully!';
      "

  webapp:
    build: .
    container_name: flower_webapp
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_started
      init-db:
        condition: service_completed_successfully
    environment:
      - DB_URL=jdbc:sqlserver://sqlserver:1433;databaseName=FLOWER_SHOP;encrypt=true;trustServerCertificate=true
      - DB_USER=sa
      - DB_PASSWORD=2DS9WDJRYv4pK2WUXu6
    restart: unless-stopped

volumes:
  sqlserver_data:
