services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: flower_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "2DS9WDJRYv4pK2WUXu6"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  init-db:
    build: ./database
    container_name: flower_init_db
    depends_on:
      - sqlserver

  webapp:
    build: .
    container_name: flower_webapp
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_started
      init-db:
        condition: service_completed_successfully
    environment:
      - DB_URL=jdbc:sqlserver://sqlserver:1433;databaseName=FLOWER_SHOP;encrypt=true;trustServerCertificate=true
      - DB_USER=sa
      - DB_PASSWORD=2DS9WDJRYv4pK2WUXu6
    restart: unless-stopped

volumes:
  sqlserver_data:
